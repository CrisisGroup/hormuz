<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eastern Hemisphere Shipping Routes</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="map" aria-label="Interactive Mapbox map of eastern hemisphere shipping routes"></div>

    <div class="map-ui" aria-label="Shipping route controls">
        <button class="map-ui__button is-active" type="button" data-map-state="baltic-india">
            Baltic to India
        </button>
        <button class="map-ui__button" type="button" data-map-state="gulf-east-asia">
            Gulf to East Asia
        </button>
    </div>

    <div class="map-status" id="map-status" role="status" aria-live="polite">
        Baltic Sea to India route
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js"></script>
    <script src="app.js"></script>
</body>

</html>
